const C={bg:"#0B1622",bgL:"#162233",bgC:"#1B2D45",bgH:"#213550",acc:"#E8C547",accDim:"rgba(232,197,71,0.12)",accBrd:"rgba(232,197,71,0.3)",red:"#E55A4F",redL:"#FF7B72",redBg:"rgba(229,90,79,0.15)",blue:"#4A9EDE",blueL:"#6DB8F2",blueBg:"rgba(74,158,222,0.15)",txt:"#E8EDF2",mut:"#7B8FA3",dark:"#4A5B6E",brd:"#263548"};

function getMedian(vp){const s=[...vp].sort((a,b)=>a-b);return s[Math.floor(s.length/2)]}

function stdAI(vp,pp){
  const med=getMedian(vp),mx=Math.max(...vp);
  if(pp===med){
    // Player found median: AI picks a losing position
    const opts=[];for(let i=1;i<=mx;i++)if(i!==med)opts.push(i);
    const far=opts.filter(p=>Math.abs(p-med)>=2);
    const pool=far.length?far:opts;
    return pool[Math.floor(Math.random()*pool.length)];
  }
  return med; // Player not on median: AI takes median and wins
}

function calcVotes(cands,vp){
  const votes={};cands.forEach(c=>votes[c.id]=0);let ab=0;const ch=[];
  vp.forEach(v=>{let mD=Infinity,cl=null,tie=false;
    cands.forEach(c=>{if(c.pos==null)return;const d=Math.abs(v-c.pos);if(d<mD){mD=d;cl=c.id;tie=false}else if(d===mD)tie=true});
    if(tie||!cl){ab++;ch.push("neutral")}else{votes[cl]++;ch.push(cl)}});
  return{votes,ab,ch};
}

function Btn({icon,label,desc,onClick,disabled,accent,small}){
  const[h,setH]=useState(false);const a=h&&!disabled;
  return(<button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} onClick={disabled?undefined:onClick}
    style={{display:"flex",alignItems:"center",gap:small?"8px":"14px",width:"100%",padding:small?"13px 16px":"15px 20px",border:accent?"none":"1px solid "+(a?C.acc:C.brd),borderRadius:"12px",background:accent?(a?"#d4b23e":C.acc):(a?C.bgH:C.bgL),color:accent?C.bg:C.txt,fontSize:small?"14px":"15px",cursor:disabled?"not-allowed":"pointer",transition:"all 0.15s",textAlign:small?"center":"left",justifyContent:small?"center":"flex-start",boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif",opacity:disabled?0.35:1,transform:a?"translateY(-1px)":"none",fontWeight:accent?"700":"500"}}>
    {icon&&<span style={{fontSize:small?"16px":"22px",width:small?"auto":"32px",textAlign:"center",flexShrink:0}}>{icon}</span>}
    <span><span style={{fontWeight:"600",display:"block"}}>{label}</span>{desc&&<span style={{fontSize:"12px",color:accent?"rgba(0,0,0,0.5)":C.mut,marginTop:"2px",display:"block"}}>{desc}</span>}</span>
  </button>);
}

function Board({vp,redPos,bluePos,choices,onSelect,canSelect,showRes,redVotes,blueVotes,abst}){
  const total=vp.length;
  const minP=Math.min(...vp),maxP=Math.max(...vp),range=maxP-minP||1;
  const pct=p=>((p-minP)/range)*100;
  const pad=32;
  const leftOf=p=>"calc("+pad+"px + "+pct(p)+"% * (100% - "+(pad*2)+"px) / 100%)";
  const uniquePos=[...new Set(vp)].sort((a,b)=>a-b);

  // Determine which candidate is left and which is right for label placement
  const redLeft = redPos!==null && bluePos!==null ? redPos <= bluePos : true;

  return(<div style={{width:"100%",padding:"8px 0"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px",fontSize:"10px",color:C.dark,textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:"600"}}><span>◀ Gauche</span><span>Droite ▶</span></div>
    
    {/* Main axis area */}
    <div style={{position:"relative",width:"100%",height:canSelect?"210px":"175px",paddingLeft:pad+"px",paddingRight:pad+"px",boxSizing:"border-box"}}>
      
      {/* Axis line at y=60 */}
      <div style={{position:"absolute",top:"60px",left:pad+"px",right:pad+"px",height:"3px",background:"linear-gradient(90deg,"+C.red+"44,"+C.dark+" 50%,"+C.blue+"44)",borderRadius:"2px"}}/>
      
      {/* Ticks at y=54, numbers at y=72 */}
      {uniquePos.map(p=>(
        <React.Fragment key={"t"+p}>
          <div style={{position:"absolute",top:"54px",left:leftOf(p),width:"1px",height:"14px",background:C.dark+"88",transform:"translateX(-50%)"}}/>
          <div style={{position:"absolute",top:"72px",left:leftOf(p),transform:"translateX(-50%)",fontSize:"10px",color:C.mut,fontWeight:"600"}}>{p}</div>
        </React.Fragment>
      ))}
      
      {/* Voters at y=22 (stacking upward) */}
      {(()=>{const out=[],si={};vp.forEach((pos,i)=>{if(!si[pos])si[pos]=0;const s=si[pos];si[pos]++;
        const c2=choices?choices[i]:"neutral";
        let bg=C.bgL,bd=C.mut+"66",cl=C.txt;
        if(c2==="red"){bg=C.redBg;bd=C.red;cl=C.redL}
        else if(c2==="blue"){bg=C.blueBg;bd=C.blue;cl=C.blueL}
        else if(c2==="neutral"&&choices){bg="rgba(100,100,100,0.2)";bd="#888";cl="#aaa"}
        out.push(<div key={"v"+i} style={{position:"absolute",top:(28-s*28)+"px",left:leftOf(pos),width:"24px",height:"24px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",transform:"translateX(-50%)",transition:"all 0.4s",background:bg,border:"2px solid "+bd,color:cl,zIndex:1}}>👤</div>)});return out})()}

      {/* Red candidate marker at y=90 */}
      {redPos!==null&&(
        <div style={{position:"absolute",top:"90px",left:leftOf(redPos),width:"34px",height:"34px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:"700",transform:"translateX(-50%)",transition:"left 0.3s",boxShadow:"0 4px 14px "+C.red+"55",background:C.red,color:"white",zIndex:3}}>R</div>
      )}
      
      {/* Blue candidate marker at y=90 */}
      {bluePos!==null&&(
        <div style={{position:"absolute",top:"90px",left:leftOf(bluePos),width:"34px",height:"34px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:"700",transform:"translateX(-50%)",transition:"left 0.3s",boxShadow:"0 4px 14px "+C.blue+"55",background:C.blue,color:"white",zIndex:3}}>B</div>
      )}
      
      {/* Labels BELOW markers at y=130 — offset left/right to avoid overlap */}
      {redPos!==null&&showRes&&(
        <div style={{position:"absolute",top:"128px",left:leftOf(redPos),transform:"translateX("+(redPos===bluePos?"-90%":redLeft?"-80%":"-20%")+")",fontSize:"10px",fontWeight:"700",color:C.red,whiteSpace:"nowrap",zIndex:3,background:C.bgC+"ee",padding:"2px 6px",borderRadius:"6px",border:"1px solid "+C.red+"44"}}>
          🔴 Vous : pos.{redPos} → {redVotes} voix
        </div>
      )}
      {bluePos!==null&&showRes&&(
        <div style={{position:"absolute",top:"148px",left:leftOf(bluePos),transform:"translateX("+(redPos===bluePos?"-10%":redLeft?"-20%":"-80%")+")",fontSize:"10px",fontWeight:"700",color:C.blue,whiteSpace:"nowrap",zIndex:3,background:C.bgC+"ee",padding:"2px 6px",borderRadius:"6px",border:"1px solid "+C.blue+"44"}}>
          🔵 IA : pos.{bluePos} → {blueVotes} voix
        </div>
      )}

      {/* Selectable positions at y=155 (or 90 if no results) */}
      {canSelect&&(
        <div style={{position:"absolute",top:"90px",left:pad+"px",right:pad+"px",display:"flex",justifyContent:"space-between"}}>
          {uniquePos.map(p=>{
            const active=redPos===p;
            return(<button key={p} onClick={()=>onSelect(p)} style={{width:"30px",height:"30px",borderRadius:"50%",border:"2px solid "+(active?C.acc:C.brd),background:active?C.acc:C.bgL,color:active?C.bg:C.mut,fontSize:"12px",fontWeight:active?"700":"500",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",fontFamily:"'DM Sans'",padding:0,transform:active?"scale(1.15)":"none",boxShadow:active?"0 0 14px rgba(232,197,71,0.35)":"none"}}>{p}</button>);
          })}
        </div>
      )}
    </div>

    {/* Results bar: RED then GREY (abstentions) then BLUE */}
    {showRes&&(
      <div style={{marginTop:"6px"}}>
        <div style={{display:"flex",gap:"2px",height:"34px",borderRadius:"8px",overflow:"hidden",background:C.bgL}}>
          {redVotes>0&&<div style={{width:(redVotes/total*100)+"%",background:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:"700",color:"white",transition:"width 0.5s",minWidth:"34px"}}>🔴 {redVotes}</div>}
          {abst>0&&<div style={{width:(abst/total*100)+"%",background:"#666",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:"600",color:"#ddd",transition:"width 0.5s",minWidth:"26px"}}>{abst}</div>}
          {blueVotes>0&&<div style={{width:(blueVotes/total*100)+"%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:"700",color:"white",transition:"width 0.5s",minWidth:"34px"}}>🔵 {blueVotes}</div>}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:"5px",fontSize:"10px",color:C.mut}}>
          <span>🔴 Rouge : {redVotes} vote{redVotes>1?"s":""}</span>
          {abst>0&&<span style={{color:"#999"}}>Abstention{abst>1?"s":""} : {abst}</span>}
          <span>🔵 Bleu : {blueVotes} vote{blueVotes>1?"s":""}</span>
        </div>
      </div>
    )}
  </div>);
}

// === SCREENS ===
function Home({go}){return(<Wrap><Header/><Card s={{display:"flex",flexDirection:"column",gap:"10px"}}>
  <Btn icon="🎮" label="Commencer une nouvelle partie" desc="Choisissez les paramètres" onClick={()=>go("pickMode")}/>

</Card><p style={{fontSize:"10px",color:C.dark,textAlign:"center"}}>Université Le Havre Normandie · EDEHN</p></Wrap>)}

function Rules({go}){return(<Wrap><Back onClick={()=>go("home")}/><Card><CTitle>📖 Règles du jeu</CTitle><div style={{lineHeight:"1.7",fontSize:"13.5px"}}>
  <p style={{fontWeight:"700",color:C.acc,marginBottom:"4px"}}>🎯 Objectif</p>
  <p style={{margin:"0 0 14px",color:C.mut}}>Des électeurs sont répartis sur un axe politique allant de la Gauche à la Droite. Deux candidats choisissent leur position sur cet axe pour essayer de maximiser leurs votes.</p>
  <p style={{fontWeight:"700",color:C.acc,marginBottom:"4px"}}>🗳️ Comment votent les électeurs ?</p>
  <p style={{margin:"0 0 14px",color:C.mut}}>Chaque électeur vote pour le candidat le plus proche de sa position. Si un électeur est exactement à égale distance des deux candidats, il s'abstient.</p>
  <p style={{fontWeight:"700",color:C.acc,marginBottom:"4px"}}>🏆 Qui gagne ?</p>
  <p style={{margin:"0 0 14px",color:C.mut}}>Le candidat qui obtient le plus de votes remporte l'élection. Arriverez-vous à trouver la position imbattable ?</p>
  <p style={{fontWeight:"700",color:C.acc,marginBottom:"4px"}}>💡 Le Théorème de l'électeur médian</p>
  <p style={{margin:0,color:C.mut}}>Ce jeu illustre un résultat fondamental de la théorie du vote découvert par Duncan Black (1948) et Anthony Downs (1957). À vous de le découvrir en jouant !</p>
</div></Card></Wrap>)}

function PickMode({go,setMode}){return(<Wrap><Back onClick={()=>go("home")}/><Card><CTitle>Mode de jeu</CTitle><div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
  <Btn icon="🤖" label="Contre l'ordinateur" desc="Trouvez la position optimale !" onClick={()=>{setMode("ai");go("pickVoters")}}/>
  <Btn icon="👥" label="2 joueurs (2 tablettes)" desc="Affrontez un autre joueur" onClick={()=>{setMode("multi");go("pickVoters")}}/>
</div></Card></Wrap>)}

  {[{n:5,d:"Idéal pour débuter"},{n:7,d:"Intermédiaire"},{n:9,d:"Plus complexe"},{n:11,d:"Expert"}].map(o=>
    <Btn key={o.n} icon={""+o.n} label={o.n+" électeurs"} desc={o.d} onClick={()=>onSelect(o.n)}/>)}
</div></Card></Wrap>)}

function JoinScreen({go,onJoin}){
  const[code,setCode]=useState(["","","",""]);const[err,setErr]=useState("");const[ld,setLd]=useState(false);
  const refs=[useRef(),useRef(),useRef(),useRef()];
  const hCh=(i,v)=>{if(!/^\d?$/.test(v))return;const n=[...code];n[i]=v;setCode(n);setErr("");if(v&&i<3)refs[i+1].current?.focus()};
  const hK=(i,e)=>{if(e.key==="Backspace"&&!code[i]&&i>0)refs[i-1].current?.focus()};
  const sub=async()=>{const f=code.join("");if(f.length!==4){setErr("Code à 4 chiffres");return}setLd(true);setErr("");
    if(!initFB()){setErr("Firebase non configuré.");setLd(false);return}
    try{const s=await fbDb.ref("games/"+f).once("value");if(!s.exists()){setErr("Introuvable.");setLd(false);return}
      const d=s.val();if(d.status!=="waiting"){setErr("Déjà commencée.");setLd(false);return}
      await fbDb.ref("games/"+f).update({status:"playing"});onJoin(f,d.settings)}catch(e){setErr(e.message);setLd(false)}};
  return(<Wrap><Back onClick={()=>go("home")}/><Card><CTitle>Rejoindre</CTitle>
    <p style={{textAlign:"center",color:C.mut,fontSize:"13px",marginBottom:"4px"}}>Entrez le code à 4 chiffres</p>
    <div style={{display:"flex",gap:"12px",justifyContent:"center",margin:"16px 0"}}>{code.map((d,i)=><input key={i} ref={refs[i]} style={{width:"52px",height:"60px",textAlign:"center",fontSize:"26px",fontWeight:"700",background:C.bgL,border:"2px solid "+(d?C.acc:C.brd),borderRadius:"10px",color:C.acc,fontFamily:"'DM Sans'",outline:"none"}} type="text" inputMode="numeric" maxLength={1} value={d} onChange={e=>hCh(i,e.target.value)} onKeyDown={e=>hK(i,e)}/>)}</div>
    {err&&<p style={{color:C.red,textAlign:"center",fontSize:"13px",marginBottom:"8px"}}>{err}</p>}
    <Btn accent small label={ld?"Connexion...":"Rejoindre"} onClick={sub} disabled={ld}/>
  </Card></Wrap>);
}

function WaitScreen({gameCode,go,onReady}){
  useEffect(()=>{if(!fbDb)return;const r=fbDb.ref("games/"+gameCode+"/status");const cb=r.on("value",s=>{if(s.val()==="playing")onReady()});return()=>r.off("value",cb)},[gameCode,onReady]);
  return(<Wrap><Card><CTitle>En attente du 2ème joueur</CTitle>
    <p style={{textAlign:"center",color:C.mut,fontSize:"13px"}}>Communiquez ce code :</p>
    <div style={{display:"flex",gap:"12px",justifyContent:"center",margin:"16px 0"}}>{gameCode.split("").map((d,i)=><div key={i} style={{width:"52px",height:"60px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px",fontWeight:"700",background:C.bgL,border:"2px solid "+C.acc,borderRadius:"10px",color:C.acc}}>{d}</div>)}</div>
    <p style={{textAlign:"center",color:C.mut}}><span className="spinner"></span> En attente...</p>
    <div style={{marginTop:"16px"}}><Btn small label="Annuler" onClick={()=>go("home")}/></div>
  </Card></Wrap>);
}

// ============================================================
// GAME: AI MODE
// ============================================================
function GameAI({vc,go}){
  const vp=STD_VP[vc],med=getMedian(vp),mx=Math.max(...vp);
  const[myPos,setMyPos]=useState(null);
  const[phase,setPhase]=useState("choose");
  const[aiPos,setAiPos]=useState(null);
  const[res,setRes]=useState(null);

  const confirm=()=>{
    if(myPos==null)return;
    const ap=stdAI(vp,myPos);
    setAiPos(ap);
    const cands=[{id:"red",pos:myPos},{id:"blue",pos:ap}];
    const r=calcVotes(cands,vp);
    setRes({myV:r.votes.red,aiV:r.votes.blue,ab:r.ab,ch:r.ch});
    setPhase("results");
  };

  const w=res?(res.myV>res.aiV?"win":res.aiV>res.myV?"lose":"tie"):null;

  return(<Wrap><Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",flexWrap:"wrap",gap:"6px"}}>
      <Tag color={C.acc} bg={C.accDim}>{vc} électeurs</Tag>
      <Tag>🤖 vs IA</Tag>
      <button onClick={()=>go("home")} style={{background:"transparent",border:"1px solid "+C.brd,color:C.mut,padding:"3px 8px",borderRadius:"6px",cursor:"pointer",fontSize:"11px",fontFamily:"'DM Sans'"}}>✕</button>
    </div>

    {phase==="choose"&&<p style={{textAlign:"center",color:C.mut,fontSize:"13px",margin:"0 0 4px"}}>🔴 Vous êtes le <strong style={{color:C.red}}>Candidat Rouge</strong>. Choisissez votre position sur l'axe !</p>}

    <Board vp={vp}
      redPos={myPos}
      bluePos={phase==="results"?aiPos:null}
      choices={phase==="results"?res.ch:null}
      onSelect={p=>phase==="choose"&&setMyPos(p)}
      canSelect={phase==="choose"}
      showRes={phase==="results"}
      redVotes={res?res.myV:0}
      blueVotes={res?res.aiV:0}
      abst={res?res.ab:0}
    />

    {phase==="choose"&&<Btn accent small label={"✅ Valider"+(myPos!=null?" (position "+myPos+")":"")} onClick={confirm} disabled={myPos==null}/>}

    {phase==="results"&&(<div style={{marginTop:"8px"}}>
      <p style={{textAlign:"center",fontSize:"16px",fontWeight:"600",margin:"0 0 12px",color:w==="win"?"#4ADE80":w==="lose"?C.red:C.acc}}>
        {w==="win"?"🏆 Bravo ! Vous avez trouvé la position optimale !":w==="lose"?"❌ L'ordinateur gagne ! Il a pris la meilleure position.":"🤝 Égalité !"}
      </p>

      {/* Explanation */}
      <div style={{background:C.accDim,border:"1px solid "+C.accBrd,borderRadius:"12px",padding:"16px",marginBottom:"14px"}}>
        {w==="win"&&<p style={{margin:0,fontSize:"13px",lineHeight:"1.7",color:C.txt}}>
          En vous plaçant en position <strong style={{color:C.acc}}>{myPos}</strong>, vous avez autant d'électeurs à votre gauche qu'à votre droite. C'est la position de <strong style={{color:C.acc}}>l'électeur médian</strong>. Depuis cette position, aucun adversaire ne peut vous battre !
        </p>}
        {w==="lose"&&<p style={{margin:0,fontSize:"13px",lineHeight:"1.7",color:C.txt}}>
          L'ordinateur s'est placé en position <strong style={{color:C.acc}}>{aiPos}</strong>. Cette position est spéciale : c'est celle de <strong style={{color:C.acc}}>l'électeur médian</strong>, c'est-à-dire l'électeur qui a autant de voisins à sa gauche qu'à sa droite. Depuis cette position, l'ordinateur capte toujours la majorité des voix. Essayez de trouver cette position !
        </p>}
        {w==="tie"&&<p style={{margin:0,fontSize:"13px",lineHeight:"1.7",color:C.txt}}>
          Égalité ! Les deux candidats captent le même nombre de voix. Essayez une autre position pour gagner.
        </p>}
      </div>

      {/* Theorem */}
      <div style={{background:C.accDim,border:"1px solid "+C.accBrd,borderRadius:"10px",padding:"14px",marginBottom:"14px"}}>
        <p style={{fontWeight:"700",color:C.acc,margin:"0 0 4px",fontSize:"12px"}}>📚 Le Théorème de l'électeur médian</p>
        <p style={{fontSize:"11.5px",color:C.mut,margin:0,lineHeight:"1.6"}}>
          Dans un vote à la majorité entre deux candidats positionnés sur un axe, le candidat situé à la position de l'électeur médian gagne toujours ou fait égalité. C'est pourquoi, dans la réalité, les partis politiques convergent vers le centre de l'échiquier politique. — D'après Duncan Black (1948) et Anthony Downs (1957).
        </p>
      </div>

      <div style={{display:"flex",gap:"10px"}}>
        <div style={{flex:1}}><Btn accent small label="🔄 Rejouer" onClick={()=>{setMyPos(null);setPhase("choose");setAiPos(null);setRes(null)}}/></div>
        <div style={{flex:1}}><Btn small label="🏠 Accueil" onClick={()=>go("home")}/></div>
      </div>
    </div>)}
  </Card></Wrap>);
}

// ============================================================
// GAME: MULTIPLAYER
// ============================================================
function GameMulti({vc,gameCode,role,go}){
  const vp=STD_VP[vc],med=getMedian(vp);
  const[myPos,setMyPos]=useState(null);
  const[oppPos,setOppPos]=useState(null);
  const[phase,setPhase]=useState("choose");
  const[confirmed,setConfirmed]=useState(false);
  const[res,setRes]=useState(null);

  useEffect(()=>{if(!fbDb)return;const r=fbDb.ref("games/"+gameCode+"/round");
    const cb=r.on("value",s=>{const d=s.val();if(!d)return;
      const mk=role==="red"?"p1":"p2",ok=role==="red"?"p2":"p1";
      if(d[mk]!==undefined&&d[ok]!==undefined){
        const cands=[{id:"red",pos:d.p1},{id:"blue",pos:d.p2}];
        const rv=calcVotes(cands,vp);
        setMyPos(d[mk]);setOppPos(d[ok]);
        const myV=rv.votes[role],opV=rv.votes[role==="red"?"blue":"red"];
        setRes({redV:rv.votes.red,blueV:rv.votes.blue,ab:rv.ab,ch:rv.ch,myV,opV});
        setPhase("results")}});
    return()=>r.off("value",cb)},[gameCode,role,vp]);

  const confirm=async()=>{if(myPos==null||confirmed)return;setConfirmed(true);
    await fbDb.ref("games/"+gameCode+"/round").update({[role==="red"?"p1":"p2"]:myPos});setPhase("waiting")};

  const w=res?(res.myV>res.opV?"win":res.opV>res.myV?"lose":"tie"):null;
  const rp=role==="red"?myPos:oppPos;
  const bp=role==="red"?oppPos:myPos;

  return(<Wrap><Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",flexWrap:"wrap",gap:"6px"}}>
      <Tag color={C.acc} bg={C.accDim}>{vc} électeurs</Tag>
      <Tag color={role==="red"?C.redL:C.blueL} bg={role==="red"?C.redBg:C.blueBg}>{role==="red"?"🔴 Vous = Rouge":"🔵 Vous = Bleu"}</Tag>
      <button onClick={()=>go("home")} style={{background:"transparent",border:"1px solid "+C.brd,color:C.mut,padding:"3px 8px",borderRadius:"6px",cursor:"pointer",fontSize:"11px",fontFamily:"'DM Sans'"}}>✕</button>
    </div>

    {phase==="choose"&&<p style={{textAlign:"center",color:C.mut,fontSize:"13px",margin:"0 0 4px"}}>Choisissez votre position sur l'axe.</p>}
    {phase==="waiting"&&<p style={{textAlign:"center",color:C.mut,fontSize:"13px",padding:"6px 0"}}><span className="spinner"></span> En attente de l'adversaire...</p>}

    <Board vp={vp}
      redPos={phase==="results"?rp:(role==="red"?myPos:null)}
      bluePos={phase==="results"?bp:(role==="blue"?myPos:null)}
      choices={phase==="results"?res.ch:null}
      onSelect={p=>phase==="choose"&&setMyPos(p)}
      canSelect={phase==="choose"}
      showRes={phase==="results"}
      redVotes={res?res.redV:0}
      blueVotes={res?res.blueV:0}
      abst={res?res.ab:0}
    />

    {phase==="choose"&&<Btn accent small label={"✅ Valider"+(myPos!=null?" (position "+myPos+")":"")} onClick={confirm} disabled={myPos==null}/>}

    {phase==="results"&&(<div style={{marginTop:"8px"}}>
      <p style={{textAlign:"center",fontSize:"16px",fontWeight:"600",margin:"0 0 12px",color:w==="win"?"#4ADE80":w==="lose"?C.red:C.acc}}>
        {w==="win"?"🏆 Victoire !":w==="lose"?"❌ Défaite !":"🤝 Égalité !"}
      </p>
      <div style={{background:C.accDim,border:"1px solid "+C.accBrd,borderRadius:"10px",padding:"14px",marginBottom:"12px"}}>
        <p style={{fontWeight:"700",color:C.acc,margin:"0 0 4px",fontSize:"12px"}}>📚 Théorème de l'électeur médian</p>
        <p style={{fontSize:"11.5px",color:C.mut,margin:0,lineHeight:"1.6"}}>
          La position de l'électeur médian est la position imbattable. Celui qui s'y place gagne toujours ou fait égalité. — Black (1948), Downs (1957).
        </p>
      </div>
      <Btn accent small label="🏠 Accueil" onClick={()=>{try{fbDb.ref("games/"+gameCode).remove()}catch(e){};go("home")}}/>
    </div>)}
  </Card></Wrap>);
}

// ============================================================
// APP
// ============================================================
function App(){
  const[scr,setScr]=useState("home");
  const[mode,setMode]=useState(null);
  const[vc,setVc]=useState(null);
  const[gc,setGc]=useState(null);
  const[role,setRole]=useState(null);

  const go=s=>{if(s==="home"){setScr("home");setMode(null);setVc(null);setGc(null);setRole(null)}else setScr(s)};

  const createGame=async(n)=>{
    if(!initFB()){alert("Firebase non configuré.");return}
    const code=""+(1000+Math.floor(Math.random()*9000));
    await fbDb.ref("games/"+code).set({settings:{voterCount:n},status:"waiting",createdAt:Date.now()});
    setGc(code);setRole("red");setVc(n);setScr("waiting")};

  const joinGame=(code,settings)=>{setGc(code);setRole("blue");setVc(settings.voterCount);setMode("multi");setScr("game")};

  const onSelV=n=>{if(mode==="ai"){setVc(n);setRole("red");setScr("game")}else createGame(n)};

  let content;
  switch(scr){
    case "home":content=<Home go={go}/>;break;
    case "rules":content=<Rules go={go}/>;break;
    case "join":content=<JoinScreen go={go} onJoin={joinGame}/>;break;
    case "pickMode":content=<PickMode go={go} setMode={setMode}/>;break;
    case "pickVoters":content=<PickVoters go={go} onSelect={onSelV}/>;break;
    case "waiting":content=<WaitScreen gameCode={gc} go={go} onReady={()=>setScr("game")}/>;break;
    case "game":
      if(mode==="ai")content=<GameAI key={"ai"+vc} vc={vc} go={go}/>;
      else content=<GameMulti key={"mp"+gc} vc={vc} gameCode={gc} role={role} go={go}/>;
      break;
    default:content=<Home go={go}/>}
  return content;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
